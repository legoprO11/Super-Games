<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intital-scale=1.0">
    <title>Super Games | Support</title>
    <meta name="Description" content="Contact me for any enquiries.">
    <link rel="stylesheet" href="css\global.css">
    <link rel="stylesheet" href="css\contact.css">
</head>
<body>
    <header class="site-header">
        <a class="logo" href="index.html">
            <img src="img/Logo.png" alt="super games logo">
            <span>Super Games</span>
        </a>
        <!-- MOBILE MENU TOGGLE: shown on mobile only; desktop/tablet keep the normal
        navigation visible -->
        <input class="menu-toggle" type="checkbox" id="menu-toggle" aria-label="Toggle
        navigation menu">
        <label class="menu-button" for="menu-toggle">
        <img src="img/MenuButton.png" alt="" aria-hidden="true">
        <span>Menu</span>
        </label>
        <nav aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="checkout.html">Checkout</a> 
        <a class="active" href="contact.html">Contact</a>
        </nav>
    </header>
    <h1>Contact Support</h1>
    <section>
        <p>Contact Our Support</p>
        <p class="contact-details">
        Email: support@example.example &nbsp;|&nbsp; Phone: 0494 676 676
        </p>
    </section>
    <section>
        <form action="#" method="post">
            <fieldset>
                <legend>Open a Ticket</legend>
                <div class="form-grid">
                    <div class="field-group">
                        <label for="contact_name">Your Name</label>
                        <input type="text" id="contact_name" name="contact_name"
                        placeholder="e.g. Gordon Freeman" required>
                    </div>
                    <div class="field-group">
                        <label for="contact_email">Your Email</label>
                        <input type="email" id="contact_email" name="contact_email"
                        placeholder="youremailhere@email.com" required>
                    </div>
                    <div class="field-group full">
                        <label for="contact_message">Your Message</label>
                        <textarea id="contact_message" name="contact_message"
                        placeholder="e.g. the checkout button dosen't work!! >=( " required></textarea>
                    </div>
                </div>
                <div class="actions">
                <button type="submit">Send Request</button>
                <button type="reset">Clear Message</button>
                </div>
            </fieldset>
        </form>
    </section>
</body>
<footer>
    <p>&copy; 2026 Super Games</p>
</footer>
</html>
